<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCQ Test System - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <!-- <h1>MCQ Test System</h1> -->
         <h1>Unique Coaching Centre/By S.K. Jha</h1>
        <p>Welcome back! Please login to continue</p>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <input type="email" id="loginEmail" name="email" required placeholder="Enter your email">
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" name="password" required placeholder="Enter your password">
        </div>

        <div class="form-group checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" id="rememberMe">
            <span class="checkmark"></span>
            Remember me
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-block">
          <span class="btn-text">Login</span>
          <span class="btn-loader"></span>
        </button>

        <p class="auth-switch">
          Don't have an account? <a href="#" id="showSignup">Sign up</a>
        </p>
      </form>

      <!-- Signup Form -->
      <form id="signupForm" class="auth-form hidden">
        <div class="form-group">
          <label for="signupName">Full Name</label>
          <input type="text" id="signupName" name="name" required placeholder="Enter your full name">
        </div>

        <div class="form-group">
          <label for="signupEmail">Email Address</label>
          <input type="email" id="signupEmail" name="email" required placeholder="Enter your email">
        </div>

        <div class="form-group">
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" name="password" required placeholder="Create a password (min 6 characters)">
        </div>

        <div class="form-group">
          <label for="signupConfirmPassword">Confirm Password</label>
          <input type="password" id="signupConfirmPassword" name="confirmPassword" required placeholder="Confirm your password">
        </div>

        <div class="form-group">
          <label for="signupRole">I am a</label>
          <select id="signupRole" name="role" required>
            <option value="">Select your role</option>
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary btn-block">
          <span class="btn-text">Create Account</span>
          <span class="btn-loader"></span>
        </button>

        <p class="auth-switch">
          Already have an account? <a href="#" id="showLogin">Login</a>
        </p>
      </form>

      <div id="authMessage" class="auth-message hidden"></div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
